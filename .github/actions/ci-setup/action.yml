name: Setup CI

runs:
  using: composite
  steps:
    # Read the pinned pnpm version from `packageManager` ourselves and pass it
    # explicitly. pnpm/action-setup@v6 currently ignores the version declared in
    # package.json and always installs the latest v11.
    # https://github.com/pnpm/action-setup/issues/225
    - name: Resolve pnpm version
      id: pnpm-version
      shell: bash
      run: echo "version=$(jq --raw-output '.packageManager | split("@")[1] | split("+")[0]' package.json)" >> "$GITHUB_OUTPUT"

    - name: Setup pnpm
      uses: pnpm/action-setup@v6
      with:
        version: ${{ steps.pnpm-version.outputs.version }}
        run_install: false

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version-file: .nvmrc
        cache: pnpm

    # `pnpm publish` shells out to the npm CLI, and OIDC trusted publishing
    # requires npm >= 11.5.1. The npm bundled with Node isn't guaranteed to meet
    # that, so pin a known-good version explicitly.
    - name: Ensure npm supports OIDC trusted publishing
      shell: bash
      run: |
        npm install -g npm@latest
        node -v
        npm -v

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile
